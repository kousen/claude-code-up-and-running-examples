<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lyrics Trainer — Sonnet 18</title>
  <style>
    :root {
      color-scheme: light dark;
    }
    body {
      font-family: Georgia, "Times New Roman", serif;
      background: #f5f1e8;
      color: #2a2a2a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #7a6a4a;
      margin-bottom: 2rem;
    }
    .card {
      background: #fffdf7;
      border: 1px solid #e2d9c4;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      padding: 3rem 2.5rem;
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    .line {
      font-size: 1.6rem;
      line-height: 1.5;
      min-height: 4.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .counter {
      font-size: 0.85rem;
      color: #999;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
    }
    button {
      font-family: inherit;
      font-size: 1rem;
      padding: 0.7rem 2rem;
      background: #3a5a8c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    button:hover {
      background: #2d4670;
    }
    button:focus {
      outline: 2px solid #6a8ac0;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <h1>Sonnet 18 — Line by Line</h1>
  <div class="card">
    <div class="counter" id="counter"></div>
    <div class="line" id="line"></div>
    <button id="next">Next</button>
  </div>

  <script>
    const lines = [
      "Shall I compare thee to a summer's day?",
      "Thou art more lovely and more temperate:",
      "Rough winds do shake the darling buds of May,",
      "And summer's lease hath all too short a date;",
      "Sometime too hot the eye of heaven shines,",
      "And often is his gold complexion dimm'd;",
      "And every fair from fair sometime declines,",
      "By chance or nature's changing course untrimm'd;",
      "But thy eternal summer shall not fade,",
      "Nor lose possession of that fair thou ow'st;",
      "Nor shall death brag thou wander'st in his shade,",
      "When in eternal lines to time thou grow'st:",
      "So long as men can breathe or eyes can see,",
      "So long lives this, and this gives life to thee."
    ];

    let currentIndex = 0;
    const lineEl = document.getElementById("line");
    const counterEl = document.getElementById("counter");
    const nextBtn = document.getElementById("next");

    function render() {
      lineEl.textContent = lines[currentIndex];
      counterEl.textContent = `Line ${currentIndex + 1} of ${lines.length}`;
    }

    nextBtn.addEventListener("click", () => {
      currentIndex = (currentIndex + 1) % lines.length;
      render();
    });

    render();
  </script>
</body>
</html>
